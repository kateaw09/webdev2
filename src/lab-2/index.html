<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>

    <style>
        * {
            padding: 0;
            margin: 0;
        }

        .navbar-contriner {
            background: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            color: white;
        }

        .logo {
            font-size: large;
            font-weight: bold;
            color: white;
            text-decoration: none;
            padding: 2rem 0;
        }

        .navbar-contriner ul {
            list-style: none;
            display: flex;
            gap: .5rem;
        }

        .navbar-contriner ul li a {
            padding: 1rem;
            color: #ffff;
            text-decoration: none;
            border-radius: .5rem;
            transition: all 0.3s ease;
        }

        .navbar-contriner ul li a.active,
        .navbar-contriner ul li a:hover {
            background-color: #666666;
        }
    </style>

    <link rel="stylesheet" href="../../assets/css/floating-btn.css">

</head>

<body>
    <nav class="navbar">
        <div class="navbar-contriner">
            <a href="index.html" class="logo">KT-WEB</a>

            <ul>
                <li><a href="#" class="active">หน้าแรก</a></li>
                <li><a href="#">เกี่ยวกับเรา</a></li>
                <li><a href="#">ติดต่อ</a></li>
            </ul>
        </div>
    </nav>

    <a href="https://kateaw09.github.io/webdev2/" class="float-btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
            <path fill="rgb(255, 255, 255)"
                d="M298.2 72.6C310.5 61.2 329.5 61.2 341.7 72.6L432 156.3L432 144C432 126.3 446.3 112 464 112L496 112C513.7 112 528 126.3 528 144L528 245.5L565.8 280.6C575.4 289.6 578.6 303.5 573.8 315.7C569 327.9 557.2 336 544 336L528 336L528 512C528 547.3 499.3 576 464 576L176 576C140.7 576 112 547.3 112 512L112 336L96 336C82.8 336 71 327.9 66.2 315.7C61.4 303.5 64.6 289.5 74.2 280.6L298.2 72.6zM304 384C277.5 384 256 405.5 256 432L256 528L384 528L384 432C384 405.5 362.5 384 336 384L304 384z" />
        </svg>
        <span class="tooltip-text">กลับหน้าหลัก</span>
    </a>
</body>

</html>
